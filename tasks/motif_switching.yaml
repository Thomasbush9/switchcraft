# Motif switching: motif 1 active in apo state, motif 2 active when ligand binds.
# State 0: apo — motif 1 enforced, motif 2 penalized
# State 1: holo — motif 1 penalized, motif 2 enforced, ligand contact enforced

num_states: 2

motifs:
  - motif1  # first motif PDB stem under motifs/
  - motif2  # second motif PDB stem under motifs/

states:
  - []                  # state 0: apo
  - ["ccd:OQO"]         # state 1: holo; replace with your ligand

losses:
  - type: MotifLoss
    motif: 0   # motif 1 active in apo
    state: 0
  - type: AntiMotifLoss
    motif: 0   # motif 1 disrupted in holo
    state: 1
  - type: AntiMotifLoss
    motif: 1   # motif 2 absent in apo
    state: 0
  - type: MotifLoss
    motif: 1   # motif 2 active in holo
    state: 1
  - type: ConfChangeLoss
    state: [0, 1]
    strength: 10
  - type: LigandContactLoss
    state: 1
